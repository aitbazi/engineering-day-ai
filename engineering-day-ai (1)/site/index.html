<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI Engineering Challenge 2026 — student project showcase" />
  <title>AI Engineering Challenge 2026</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── NAV ─────────────────────────────────────────────── -->
  <nav class="nav">
    <div class="nav-inner">
      <span class="nav-logo">AI<span>·</span>ENG</span>
      <a href="index.html"  class="nav-link active">🏆 Projects</a>
      <a href="submit.html" class="nav-link">📤 Submit</a>
    </div>
  </nav>

  <!-- ── HERO ─────────────────────────────────────────────── -->
  <section class="hero">
    <div class="hero-eyebrow anim anim-d1">AI Engineering Challenge · 2026</div>

    <h1 class="hero-title anim anim-d2">
      <span class="accent-y">BUILD</span><br>
      <span class="accent-b">THE</span>
      <span class="accent-p">FUTURE</span>
    </h1>

    <p class="hero-sub anim anim-d3">
      8 groups. One challenge.<br>
      Create a <strong>game</strong> or <strong>video</strong> about engineering using AI tools.
    </p>

    <div class="hero-btns anim anim-d4">
      <a href="submit.html" class="btn btn-primary">📤 Submit Your Project</a>
      <a href="#projects"   class="btn btn-outline">🏆 See All Projects</a>
    </div>
  </section>

  <!-- ── PROJECTS SECTION ──────────────────────────────────── -->
  <main class="wrapper" id="projects" style="padding-top:48px;padding-bottom:80px;">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-chip">
        <strong id="stat-total">0</strong> Projects
      </div>
      <div class="stat-chip">
        <strong id="stat-games">0</strong> Games
      </div>
      <div class="stat-chip">
        <strong id="stat-videos">0</strong> Videos
      </div>
      <div class="stat-chip">
        <strong id="stat-groups">0</strong> / 8 Groups Submitted
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <button class="filter-chip active" onclick="setFilter('all',   this)">All</button>
      <button class="filter-chip"        onclick="setFilter('game',  this)">🎮 Games</button>
      <button class="filter-chip"        onclick="setFilter('video', this)">🎬 Videos</button>
      <button class="filter-chip"        onclick="setFilter('other', this)">💡 Other</button>
    </div>

    <!-- Cards -->
    <div class="projects-grid" id="projects-grid">
      <!-- injected by projects.js -->
    </div>

  </main>

  <!-- ── MODAL ─────────────────────────────────────────────── -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">

      <div class="modal-stripe" id="modal-stripe"></div>

      <div class="modal-inner">
        <div class="modal-header">
          <h2 class="modal-title" id="modal-title"></h2>
          <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
        </div>

        <div class="modal-badges" id="modal-badges"></div>

        <p class="modal-desc" id="modal-desc"></p>

        <div class="modal-section" id="modal-tools-section">
          <div class="modal-label">AI Tools Used</div>
          <div class="modal-value" id="modal-tools-value"></div>
        </div>

        <div class="modal-section" id="modal-members-section">
          <div class="modal-label">Team Members</div>
          <div class="modal-value" id="modal-members-value"></div>
        </div>

        <div class="modal-links" id="modal-links"></div>
      </div>

    </div>
  </div>

  <!-- ── TOAST ─────────────────────────────────────────────── -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <!-- ── SCRIPTS ───────────────────────────────────────────── -->
  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/projects.js"></script>
  <script>
    // Boot
    document.addEventListener('DOMContentLoaded', renderProjects);
  </script>

</body>
</html>
